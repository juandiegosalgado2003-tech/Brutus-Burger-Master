{% extends 'base_personal.html' %}
{% block title %}Eliminar{% endblock %}
{% block content %}
<div style="max-width:400px; margin:3rem auto; text-align:center;">
  <div class="card-dark p-3">
    <div style="font-size:3rem; margin-bottom:1rem;">⚠️</div>
    <h3>¿Eliminar "{{ objeto.nombre }}"?</h3>
    <p class="text-muted">Esta acción no se puede deshacer.</p>
    <form method="POST" style="display:flex;gap:0.5rem;justify-content:center;">
      {% csrf_token %}
      <button type="submit" class="btn-danger-custom"><i class="bi bi-trash"></i> Sí, eliminar</button>
      <a href="/personal/carta/" class="btn-outline-custom">Cancelar</a>
    </form>
  </div>
</div>
{% endblock %}
